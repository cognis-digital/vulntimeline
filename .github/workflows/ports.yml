name: ports

# Build + test the cross-language ports of the vulntimeline core CLI surface
# (metrics + flags). These are passive/offline only and run entirely against
# the committed example fixture — never a real external host.

on:
  push:
    branches: [main, master]
    paths:
      - "ports/**"
      - ".github/workflows/ports.yml"
      - "examples/**"
  pull_request:
    paths:
      - "ports/**"
      - ".github/workflows/ports.yml"

jobs:
  node:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ports/node
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Unit tests (node --test)
        run: node --test
      - name: Smoke test (offline)
        run: |
          node vulntimeline.js metrics ../../examples/advisories.json
          node vulntimeline.js flags ../../examples/advisories.json || true

  go:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ports/go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
      - name: Vet
        run: go vet ./...
      - name: Unit tests
        run: go test ./...
      - name: Build + smoke test (offline)
        run: |
          go build -o vulntimeline .
          ./vulntimeline metrics ../../examples/advisories.json

  rust:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ports/rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Unit tests
        run: cargo test
      - name: Build + smoke test (offline)
        run: |
          cargo build --release
          ./target/release/vulntimeline metrics ../../examples/advisories.json
