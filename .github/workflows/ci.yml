name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest -q

      - name: Smoke-test CLI (offline)
        run: |
          vulntimeline build examples/advisories.json
          vulntimeline metrics examples/advisories.json
          vulntimeline flags examples/advisories.json

      - name: Smoke-test data feeds (offline / air-gap)
        env:
          COGNIS_FEEDS_CACHE: ${{ github.workspace }}/demos/09-live-feed-enrichment/feeds_cache
        run: |
          vulntimeline feeds list
          vulntimeline feeds get cisa-kev --offline
          vulntimeline build demos/09-live-feed-enrichment/advisories.json --enrich --offline --no-ascii
